<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>向往货源地址发布页</title>
    <style>
        /* 全局样式：背景图全屏覆盖+复刻样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body { 
            font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif; 
            /* 植入你的背景图，设置全屏覆盖、不拉伸、固定不动 */
            background: url('https://p11-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/c4e2584e494f4cdf933e326ab7bf2f64.jpg~tplv-a9rns2rl98-image.png?lk3s=8e244e95&rcl=202602201715590340FD216A0A9471E78A&rrcfp=dafada99&x-expires=2087802960&x-signature=KxnK%2BNA1iB3fqa3VdzCBsEla89o%3D') no-repeat center center fixed;
            background-size: cover; /* 自适应覆盖全屏，不拉伸 */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
            /* 背景加半透明遮罩，保证文字清晰 */
            position: relative;
        }
        /* 背景遮罩：让文字/按钮更醒目 */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5); /* 黑色半透明遮罩，可调整透明度 */
            z-index: 0;
        }
        /* 顶部提示条样式：复刻截图效果 + 时间布局 */
        .top-notice {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 12px 20px;
            font-size: 0.95rem;
            z-index: 9999;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .notice-text {
            text-align: left;
        }
        .beijing-time {
            text-align: right;
            color: #00ff9d; /* 时间用绿色高亮，更醒目 */
            font-weight: bold;
        }
        .top-notice a {
            color: #ffd700;
            text-decoration: none;
            font-weight: bold;
        }
        .top-notice a:hover {
            text-decoration: underline;
        }
        /* 主容器：卡片悬浮+毛玻璃效果，层级高于背景 */
        .container { 
            max-width: 700px; 
            width: 100%;
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(15px);
            padding: 50px 40px; 
            border-radius: 20px; 
            box-shadow: 0 0 30px rgba(0, 123, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.15);
            position: relative;
            z-index: 1; /* 确保容器在背景遮罩上方 */
            margin-top: 70px; /* 给顶部提示条留出空间 */
        }
        /* 标题样式：渐变文字，更醒目 */
        h1 { 
            text-align: center; 
            font-size: 2.2rem;
            margin-bottom: 25px;
            background: linear-gradient(90deg, #4cc9f0, #4895ef, #7209b7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 700;
        }
        /* 提示文字：浅色+居中 */
        .tips { 
            text-align: center; 
            color: #f0f5ff; 
            margin: 0 0 40px;
            line-height: 1.8;
            font-size: 1rem;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        /* 按钮组：改为垂直排列的行 */
        .btn-group { 
            display: flex;
            flex-direction: column;
            gap: 25px; 
        }
        /* 按钮行：每行内部布局 */
        .btn-row {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }
        /* 按钮样式：渐变+悬浮效果 */
        .btn { 
            display: block; 
            padding: 20px 0; 
            text-align: center; 
            background: linear-gradient(90deg, #4361ee, #3a0ca3);
            color: white; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: 600; 
            font-size: 1.1rem;
            transition: all 0.4s ease;
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
            min-width: 220px;
        }
        /* 按钮hover效果：上浮+发光 */
        .btn:hover { 
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(67, 97, 238, 0.5);
            background: linear-gradient(90deg, #3a0ca3, #4361ee);
        }
        /* 按钮点击波纹效果 */
        .btn::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }
        .btn:active::after {
            width: 300px;
            height: 300px;
            opacity: 0;
        }
        /* 手机端适配 */
        @media (max-width: 768px) {
            .container {
                padding: 35px 25px;
                margin-top: 90px;
            }
            h1 { font-size: 1.8rem; }
            .tips { font-size: 0.95rem; }
            .btn { padding: 18px 0; font-size: 1rem; min-width: 180px; }
            .btn-group, .btn-row { gap: 20px; }
            .top-notice {
                font-size: 0.85rem;
                padding: 10px 15px;
                flex-direction: column;
                align-items: center;
            }
            .notice-text, .beijing-time {
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <!-- 实时更新北京时间的JS代码 -->
    <script>
        // 格式化日期时间：补零+拼接
        function formatDateTime(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');
            return `北京时间：${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
        }

        // 更新时间函数
        function updateClock() {
            const now = new Date(); // 获取当前时间（自动适配北京时间）
            document.getElementById('realTimeClock').textContent = formatDateTime(now);
        }

        // 页面加载时立即更新，之后每秒更新一次
        updateClock();
        setInterval(updateClock, 1000);
    </script>
