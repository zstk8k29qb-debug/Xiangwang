        }
        .btn-group {

            flex-direction: column;
            gap: 25px; 
        }
        .btn-row {
            display: flex;
            justify-content: center;
            gap: 25px;

        }
        .btn {

            padding: 20px 0;

            color: white; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: 600; 
            font-size: 1.1rem;
            transition: all 0.4s ease;
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
            min-width: 220px;
        }
        .btn:hover { 
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(67, 97, 238, 0.5);
            background: linear-gradient(90deg, #3a0ca3, #4361ee);
        }
        .btn::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }
        .btn:active::after {
            width: 300px;
            height: 300px;
            opacity: 0;
        }
        @media (max-width: 768px) {

<script>
window.onload = function() {
    document.getElementById('bgImg').style.opacity = 1;

    function formatDateTime(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        const hours = String(date.getHours()).padStart(2, '0');
        const minutes = String(date.getMinutes()).padStart(2, '0');
        const seconds = String(date.getSeconds()).padStart(2, '0');
        return `北京时间：${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
    }
    function updateClock() {
        const now = new Date();
        document.getElementById('realTimeClock').textContent = formatDateTime(now);
    }
    updateClock();
    setInterval(updateClock, 1000);
};
</script>
