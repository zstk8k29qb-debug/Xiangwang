        body { 
            font-family: "微软雅黑", Arial, sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
            margin: 0; 
            padding: 20px; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* 主容器：卡片式设计，带阴影 */
        .container { 
            max-width: 800px; 
            width: 100%;
            background: white; 
            padding: 40px 30px; 
            border-radius: 15px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.12); 
        }
        /* 标题样式 */
        h1 { 
            text-align: center;

        }

            font-size: 1rem;
        }
        /* 按钮组：2列布局，适配手机 */
        .btn-group { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; 
        }
        /* 按钮样式：渐变背景，hover效果 */
        .btn { 
            display: block; 
            padding: 18px 0; 
            text-align: center; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; 
            text-decoration: none; 
            border-radius: 10px; 
            font-weight: bold; 
            font-size: 1.05rem;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }
        /* 按钮hover：轻微上浮+加深阴影 */
        .btn:hover { 
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(102, 126, 234, 0.3);
        }
        /* 手机端适配：调整文字和按钮 */
        @media (max-width: 768px) {
            h1 { font-size: 1.6rem; }
            .tips { font-size: 0.9rem; }
            .btn { padding: 15px 0; font-size: 1rem; }
        }
    </style>
</head>
